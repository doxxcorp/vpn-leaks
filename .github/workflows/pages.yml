# Publish VPNs/*.html (+ style/icons) to GitHub Pages.
# One-time: repo Settings → Pages → Build and deployment → Source: GitHub Actions.
name: Pages

on:
  push:
    branches: [main, master]
    paths:
      - "VPNs/**"
      - "style/icons/**"
      - ".github/workflows/pages.yml"
      - "scripts/build_github_pages_site.py"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage site
        run: python3 scripts/build_github_pages_site.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
