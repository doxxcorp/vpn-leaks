stabilize_seconds: 3
ip_endpoints:
  - url: "https://api.ipify.org"
    format: text
  - url: "https://api64.ipify.org"
    format: text
  - url: "https://api.ipify.org?format=json"
    format: json
    json_ipv4_key: ip

dns:
  test_hostname: "whoami.akamai.net"
  external_pages:
    - name: "ipleak_dns"
      url: "https://ipleak.net/"
      timeout_seconds: 45
  local_resolv_conf: true

ipv6:
  curl_v6_urls:
    - "https://api64.ipify.org"
  external_pages:
    - name: "test_ipv6"
      url: "https://test-ipv6.com/"
      timeout_seconds: 45

webrtc:
  gather_timeout_ms: 12000
  stun_servers:
    - urls: "stun:stun.l.google.com:19302"
  max_gather_rounds: 3

fingerprint:
  enabled: false
  urls: []
